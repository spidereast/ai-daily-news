# 领域分类描述
categories:
  ai: "人工智能"
  programming: "编程开发"
  tech: "科技数码"
  startup: "创业投资"
  economy: "经济金融"
  digital: "数码产品"
  hightech: "高科技"
  ev: "新能源汽车"
  imaging: "数码影像"  # 暂无专用源，从其他源筛选

# 采集偏好设置
preferences:
  max_total_items: 50          # 总共最多文章数
  max_per_category: 10         # 每类最多文章数
  min_content_length: 50       # 最小内容长度
  timeout_seconds: 15          # 请求超时时间
  retry_count: 2               # 重试次数
  deduplicate: true            # 去重
  dedup_by_title: true         # 按标题去重
  dedup_by_url: true           # 按链接去重
  
  # 时间过滤
  date_range_days: 2           # 只采集最近N天的文章
  
  # AI摘要设置
  ai_summary:
    enabled: true
    max_articles: 20           # 最多 summarise 的文章数
    summary_length: 150        # 摘要长度（字符）
    prompt: |
      你是一个专业的科技资讯编辑。请为以下新闻生成简明的中文摘要，突出核心信息，控制在150字以内。
      
      标题：{title}
      来源：{source}
      内容：{content}
      
      摘要：
  
  # 通知设置（可选）
  notifications:
    enabled: false
    on_error: true
    on_success: false

# 代理设置（可选）
proxy:
  enabled: false
  # url: "http://proxy.example.com:8080"
  
# 请求头
headers:
  User-Agent: "Mozilla/5.0 (compatible; AI-Daily-News/1.0; +https://github.com/spidereast/ai-daily-news)"
  Accept: "application/rss+xml, application/xml, text/xml; q=0.9, */*; q=0.8"